syntax = "proto3";

package nous;

// Nous Core gRPC service.
service NousService {
  // Get current engine status.
  rpc GetStatus (GetStatusRequest) returns (GetStatusResponse);

  // Query recent events with optional filters.
  rpc QueryEvents (QueryEventsRequest) returns (QueryEventsResponse);

  // Look up an entity's risk score.
  rpc QueryEntity (QueryEntityRequest) returns (QueryEntityResponse);

  // Generate a context window from current semantic state.
  rpc Observe (ObserveRequest) returns (ObserveResponse);

  // Submit a triage verdict for a finding.
  rpc SubmitVerdict (SubmitVerdictRequest) returns (SubmitVerdictResponse);

  // Submit a response action.
  rpc SubmitAction (SubmitActionRequest) returns (SubmitActionResponse);

  // Stream events in real-time.
  rpc StreamEvents (StreamEventsRequest) returns (stream EventNotification);
}

message GetStatusRequest {}

message GetStatusResponse {
  // Total events ingested since startup.
  uint64 event_count = 1;
  // Number of active findings.
  uint64 active_findings = 2;
  // Seconds since engine started.
  uint64 uptime_seconds = 3;
  // Engine version string.
  string version = 4;
}

message QueryEventsRequest {
  // Filter by OCSF class_uid (0 = all).
  uint32 class_uid = 1;
  // Filter by minimum severity (0 = all).
  uint32 min_severity = 2;
  // Maximum number of events to return.
  uint32 limit = 3;
}

message QueryEventsResponse {
  // Events serialized as JSON strings.
  repeated string events = 1;
  // Total matching events (may exceed limit).
  uint64 total = 2;
}

message QueryEntityRequest {
  // Entity type (e.g., "ip_address", "domain").
  string entity_type = 1;
  // Entity value (e.g., "10.0.0.1", "example.com").
  string value = 2;
}

message QueryEntityResponse {
  // Whether the entity was found.
  bool found = 1;
  // Risk score (0-100), 0 if not found.
  uint32 risk_score = 2;
  // Entity type echoed back.
  string entity_type = 3;
  // Entity value echoed back.
  string value = 4;
  // Total events referencing this entity.
  uint64 hit_count = 5;
  // First seen timestamp (epoch nanos).
  int64 first_seen = 6;
  // Last seen timestamp (epoch nanos).
  int64 last_seen = 7;
  // Co-occurring entities, sorted by count descending.
  repeated EntityCoOccurrence co_occurrences = 8;
}

message EntityCoOccurrence {
  // Entity type of the co-occurring entity.
  string entity_type = 1;
  // Value of the co-occurring entity.
  string value = 2;
  // Number of events where the two entities co-occur.
  uint64 count = 3;
}

message ObserveRequest {
  // Token budget (0 = default 4096).
  uint32 token_budget = 1;
  // Output format: "structured_json", "narrative", "delta".
  string format = 2;
}

message ObserveResponse {
  // The context window as a JSON string.
  string context_window = 1;
}

message SubmitVerdictRequest {
  // Finding ID (UUID string).
  string finding_id = 1;
  // Verdict: "true_positive", "false_positive", "benign", "needs_investigation".
  string verdict = 2;
  // Agent that submitted the verdict.
  string agent_id = 3;
  // Reasoning for the verdict.
  string reasoning = 4;
  // Confidence (0.0–1.0).
  double confidence = 5;
}

message SubmitVerdictResponse {
  // Verdict ID (UUID string).
  string verdict_id = 1;
  // Whether the verdict was accepted.
  bool accepted = 2;
}

message SubmitActionRequest {
  // Action type: "escalate", "suppress", "isolate", "block", "allowlist".
  string action_type = 1;
  // Agent that submitted the action.
  string agent_id = 2;
  // Target entity type (e.g., "ip_address").
  string target_entity_type = 3;
  // Target entity value.
  string target_value = 4;
  // Reasoning for the action.
  string reasoning = 5;
}

message SubmitActionResponse {
  // Action ID (UUID string).
  string action_id = 1;
  // Whether the action was accepted.
  bool accepted = 2;
}

message StreamEventsRequest {
  // Filter by OCSF class_uid (0 = all).
  uint32 class_uid = 1;
  // Filter by minimum severity (0 = all).
  uint32 min_severity = 2;
}

message EventNotification {
  // Event serialized as JSON string.
  string event_json = 1;
  // OCSF class_uid for quick filtering.
  uint32 class_uid = 2;
  // Severity level (0-5).
  uint32 severity = 3;
}
